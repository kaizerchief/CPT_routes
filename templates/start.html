<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Generador de Rutas</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d24;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --input-bg: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(99, 102, 241, 0.1) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a5b4fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .option-card {
            background-color: rgba(31, 41, 55, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem 1.5rem;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .option-card:hover {
            border-color: var(--primary);
            background-color: rgba(99, 102, 241, 0.05);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .option-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .option-title {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .option-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        @media (min-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Sistema de Rutas</h1>
            <p>Selecciona una opción para comenzar</p>
        </div>

        <div class="options-grid">
            <a href="{{ url_for('upload') }}" class="option-card">
                <div class="option-icon">📁</div>
                <div class="option-title">Cargar CSV</div>
                <div class="option-desc">Sube un archivo para procesar rutas y generar un reporte PDF</div>
            </a>

            <a href="{{ url_for('ver_rutas') }}" class="option-card">
                <div class="option-icon">🗺️</div>
                <div class="option-title">Ver Rutas</div>
                <div class="option-desc">Visualiza las rutas y el histórico actualmente cargado</div>
            </a>
        </div>
    </div>

</body>
</html>
